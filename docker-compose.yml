services:
  ollama:
    image: ollama/ollama:latest
    container_name: nust-bank-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nust-bank-backend
    depends_on:
      - ollama
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs:ro
      - ./rag_data:/app/rag_data:ro
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nust-bank-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  ollama_data:
  hf_cache:
